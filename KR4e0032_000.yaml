body:
  text: 提要臨安集六卷别集類五明臣等謹案臨安集六卷明錢宰撰宰字子豫一字伯均會稽人元至正中中甲科親老不赴公車教授于鄉明初徴修禮樂書尋以病去洪武六年授國子助教以賦早朝詩忤旨遣歸二十七年又召修書傳會選書成優賚加博士致仕事迹附見明史趙俶傳考集中金陵形勝論末署洪武二十七年六月國子博士致仕錢宰進是致仕即在奉召之年蓋留京師者不及一嵗也宰學有原本在元末已稱宿儒韓宜可唐之淳皆其弟子其詩吐辭清拔寓意髙逺刻意古調不屑為豔仄一體徐泰詩談譬以霜曉鯨音自然洪亮古文雖非所擅長而謹守法度亦無卑冗之習其集明史藝文志焦竑國史經籍志俱未著録則在明代行世已稀今從永樂大典中採掇編排參以諸選本所録釐為六卷以備明初之一家宰本浙東人集以臨安名者蓋自以為吳越武肅王十四世孫從其舊貫也乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀自序文者道之寓也文豈易言哉風霆日星天文也海嶽河江地文也六經之道著之書者人文也聖人以經天緯地參贊化育建三極焉夫豈易言哉自吾聖人刪定之後惟孟軻氏得其宗荀卿董仲舒揚子雲王通韓愈之數子升其堂焉彼楚騷泆蕩怪神過於中蒙莊繆悠荒唐戾於道固未暇論若漢賈生司馬相如遷固之于史劉更生父子之于經唐柳河東宋歐陽廬陵王臨川曾南豐蘇文安東坡潁濱皆以文章大家名世而舂陵河南橫渠新安五先生又深造于道焉後之作者代非一人猶不敢與漢唐以來諸名家並稱後學乃欲以文鳴于時何其不自量耶雖然道之著于外者謂之文風霆日星之著于天海嶽河江之著于地六學之著于經固天地聖人之文之大全也未聞著于事物之微者非文也彼鳶也而戾于天非文乎彼魚也而躍于淵非文乎蹄涔之水而風行焉丘垤之草而春生焉螢爝之微而光燁焉蚊蟲之細而聲砰焉亦皆其文之著也夫豈謂文之大全乎先王之世汙尊抔飲固禮之始也蕢桴土鼓固樂之萌也彼稗官巷語芻蕘俚辭先王不棄焉亦取其間有合于道耳先世自文僖公與其從昆弟祕監昆內翰易侍讀藻洎諸子若孫咸出入詞林世以文承家顧惟不肖忘其固陋勉焉置身文字間近自成均致事而歸間緝舊所著述題曰臨安集非所謂文也或得以不墜前人之緒耳尚庶幾知我者黜其非正其繆俾進於道焉洪武二十九年嵗次甲戌日長至臨安錢宰敘
