body:
  text: 臨安集巻二明錢宰撰五言律詩青山白雲圖老米不復得房山或可探微茫春嶂外彷彿大江南澗水落幽石樹梢分斷嵐何時柁樓底漁唱倚清酣懶性懶性殊清絶髙情不可降支頤攲白石側耳聽秋江髩髮絲千縷孫兒玉一雙朝來賓客至有酒緑翻缸新月樓上見新蟾呼兒急捲簾即看明淺席旋復上虛簷兎魄潛銀窟蛾眉掛玉纎團團三五夜烏鵲已先占𤓰洲夜泊旅夜𤓰洲泊秋懐浩欲沉星河如海合江漢入吳深天塹無南北川流自古今隔花漁唱起千里故園心題畫伊誰愛兹境而忘登涉勞一水天上逺雙松野中髙峭壁無樵徑深溪絶漁舠唯應學仙者麋鹿與遊遨七言律詩二月望早朝奉天殿和朱編修韻雞唱文樓午夜傳瓊林璧水共朝天螭㘭上下星河近鳳闕東西日月懸干羽舞階瞻虎拜冕旒當宁聽龍言歸來又奏昇平曲望賜金花一炬蓮和張自行過城南作畫負郭髙居晝不開繞堦流水緑於苔花前洗筆供詩畫馬上敲門知客來深樹流鶯通宴席碧香浮蟻灔春杯官衙正在行軍幕醉後何妨犯夜回送昱大徹住天台能仁寺天台東掖倚層關卓錫西林列翠環石上牛歌逢拾得溪頭虎嘯識溈山白雲出定拈花笑明月歸樵採藥還却憶故山松栢近夢隨龍象上巑岏承制送日本使臣還國日本扶桑接大瀛進來畫扇妙丹青欲窮滄海歸王㑹先遡南風入帝京玉帛喜瞻周禮樂衣冠已識漢儀刑九重埀拱開皇極天下同文萬國寧送宋甥原亮從子誠兄讀書塔山寺汝於舅氏從游逺我與難兄相憶深兩眺青山來入夢一江白水去同心簷花夜雨明雙炬鮭菜春船送萬金休暇何時定歸省舍雲飛處是山陰祈雪再應簽判徐安國次韓以二詩示同僚咸和併次韻正月四日旱甚三冬尫未焚且芬椒苾禱羣神一天和氣梅花曉千里輕風柳絮春豐穰定看倉腐粟窮愁那嘆甑生塵莫疑瑞應私星渚造物何心處處均請禱羣祠㑹弁紳再呈嘉瑞感神明漢庭已奏三朝禮梁苑俄驚二月春萬壑玉龍翔蟄霧一簾粉蝶撲香塵凝眸原野無髙下平地何須問土均賦得秦淮夜月送友人往茶陵秦淮一水合神州凉月當空照素秋風露氣清雙闕近星河影落大江流放船白下門西路買酒長干橋上樓送客湖湘𣺌千里好懐回首憶清游白下門西月色多滿襟風露拍星河乾坤混合天無塹江漢朝宗海不波夢醒潮生桃葉渡夜凉誰唱竹枝歌放船直上雲陽去如此髙情奈爾何滕王閣天連飛閣楚江流雲擁鑾車帝子遊帝子不來歌舞歇江流常抱古今愁望窮南極飛鴻盡起倚西山落日收惟有東都徐孺子髙風一榻抗南州分題賦鏡湖送張用中鏡湖白波木葉稀凉風蕭蕭入客衣季真賜宅已無主太白酒船空棹歸野色驚秋鴻雁下水風吹雨鯉魚飛此時張翰吳中去雲鎖稽山失翠微題王煮石推篷圖粲粲晴林截素霓夢回何處覔新題畫簷壓檻江南屋短棹推篷雪後溪落月欲分花上下春風不隔樹髙低何當一見冰霜表放棹孤山烟水西題錢達卿雲林採藥圖清溪流水行者誰野服飄然歌紫芝山人要覔蓬萊藥越女喜得邯鄲醫丹崖斷隴落日晚青林小屋還雲遲歸來笑倚桃花樹塵世浮沉都不知題方徳逺雲林採藥圖小島蓬萊隔郡河斸苓採术每相過不經海水三千逺已活童兒五百多芝草逢春生石上桃花流水渡山阿歸來更閲神農紀今古良醫奈爾何題林塘幽許詢宅畔好亭臺牕近江漚面面開緑樹當門流水注青山如畫入城來幽人睡起吟池草童子春閒掃石苔如此林泉更深絶題詩難得浣花才題剡張克讓萬松􅌪百頃蒼雲小結茅溪風流響度晴梢半窓山月驚孤鶴没屋秋濤走萬蛟採藥有時收琥珀燒烟何處覔魚膠投閒未許官封及且復深居學許巢題柯敬仲畫竹我愛丹丘飛白石疎篁老樹倚林皋空中鸞鳳雙飛下海上珊瑚二尺髙奎閣舊曾承雨露蒼梧今已𣺌雲濤荒林斷隴秋風外零落當年宫錦袍春暉堂為張仲修題春暉堂前春草妍白雲孤往幾經年佳兒不忘手中線慈母久抛琴上弦晝幕風微黄雀舞朝盤海近白魚鮮姚江自是姚虞俗及見旌門應更賢題王煮石梅花煮石山人今永别見花長作故人看縞衣綽約春來瘦風節嚴凝雪後寒每憶荒烟啼翠羽笑扶明月下飛鸞何煩宋玉相招得環佩歸來露未乾題崆峒石室洞天琳館倚江城一室崆峒晝不扄白石無糧誰解種黄金有道鍊還成幾時雲氣生秋雨長夜丹光動落星顧我正慙嵇叔夜素書何處覔黄庭遊山小縣曾聞鼔角傳雲山深處夢相牽年來還愛丘園近老去偏于杖履便樹繞石頭知客路巖迴谷口見人烟携琴出郭茅堂宿誰復含愁鳥道邊題夏氏停雲軒五柳當門元亮宅停雲長憶故人還北牕心事羲皇上南渡衣冠晉宋間千古髙情空悵望近來交道漸間關松江賴有人如昔誰謂風流不可攀松江烟水留賓處每憶良朋晝不關稚子當門迎馬首吳姬洗盞立花間屋梁落月生顔色竹上清風解佩環矯首停雲在天末春醪誰共醉言還題凌彦翀柘軒團團柘樹没幽居門外官河近石渠十􅅕春陰連薺麥半林落日似桑榆吳蠶葉盡婦供職江燕花殘兒讀書俎有白魚尊有酒不須深隠學樵漁雪夜題徐彦章梅深軒幽林白雪滿江南欲問春風冷未堪珠樹月明誰解種玉田花合不勝簪霓裳小隊參差舞翠袖髙情彷彿探不似杜陵詩思好凭欄東閣倚清酣題李筠問月軒明月在天無古今流光長照酒杯深嫦娥顧兎或可問謫仙騎鯨誰復吟醉舞霓裳翻舊曲笑歌桂樹落秋陰髙風邁世殊難繼袖拍闌干且滿斟題陳惟賢藏芸軒市南書屋樹陰凉多種梧桐待鳳翔滋蘭滿堦草自碧汗簡揷架芸其黄每聞懸榻髙風在安得下帷春晝長愛爾家庭能教子花前佩玉總鏘鏘題聽竹軒衡門深閉人不到天籟蕭蕭枕簟凉記得秋風生鄠杜夢隨夜雨度瀟湘舟人擊檝魚龍舞仙客吹笙鸞鳳翔睡起開窓聲寂寂髙林玉立萬篔簹題陳文玉聽雨軒西軒聽雨知何處風雨年年過雁雙髙枕凉秋梧葉井短牋深夜杏花窓故交零落𣺌滄海倦客歸來卧月江剪韭不堪成獨酌漫教春酒緑翻缸題李養能雲松巢昔人醉捉江月去此地安得雲松巢落日九江勞夢想清風五老入神交有時雲氣生窓几長聽松聲下樹梢却是傳家有仙骨越山多處結衡茅題韓伯時剪韭軒西園春韭與堦平留客西軒夜不扄舊雨别來今雨至早畦摘盡晚畦青每懐海内皆兄弟相對花前幾醉醒我亦愛君喬木好嚶嚶黄鳥把杯聽山下韭苗今幾畦故人日夕過幽栖霜刀差差剪不盡翠綬若若青還齊春風衞八堂上燕夜雨杜陵燈前題尊中有酒為君酌明日别懐東復西題毗墟寺臨清軒寺下清江一鏡開天光雲影見亭臺南湖楊柳酒船去西塞桃花漁唱來𣺌𣺌魚龍俱出没翻翻鷗鷺絶驚猜登臨還許陶元亮與爾賦詩同舉杯一室空明壓鏡天不須杯渡竟逃禪水光入户屋髙下人影落波身後先卜築近連湖上宅過門長見雪中船每聞避地多佳客曾道歸來有賦篇題鮑原禮畫菜鮑生畫菜得真趣不與黄筌花較妍老圃春晴朝荷鍤客窓風雨夜開園太羮𤣥酒有至味海月玉珧皆小鮮愛爾風翻紫復碧晚菘早芥得春先五言絶句春日閒居霽日簷牙落光風瓦上生草晴跳蚱蜢花暖困狸狌采菱曲緑柳横塘曲滄灣是妾家菱歌不解唱秋水照荷花落日浣紗渚菱歌唱晚風解衣濯秋水乘月採芙蓉溪上採蓮女秋波照晚粧心如蓮子苦情似藕絲長荷葉紉為佩芙蓉緝作裳妾心花下藕節節是秋霜曉起野曠晨光發江清夜氣存大星翻玉斗落月墮金盆聞砧秋砧搗不得亮月麗髙梧清暉與君共素心同妾孤夜泊西港緑樹如韋曲澄江似謝家暖雲巢燕子清露浸梨花題畫十三首雙松含古色紅樹已先秋百頃風潭浄髙情獨泛舟雲深見樓閣天際墮青鸞松下盤桓者猶是晉衣冠落日赤雲西青山照大溪草堂松樹下坐聽鵓鳩啼一曲江南弄山長楚水遥江邊楊柳樹誰繫木蘭橈雲氣曉蒼茫秋深草木黄霓旍下南浦云是楚襄王江水去悠悠籧篨抱莫愁白頭埀釣者疑是渭濱叟塞北多冰雪江南足稻粱相求應同類莫近艾如張帝子下北渚江寒愁不歸空遺一巻石拂斷六銖衣百鳥共春風相呼樂意同不知縁底事爾作白頭翁有鳥名鶺鴒在原飛且鳴人皆有兄弟唯爾獨多情白鷺白於雪于飛在洲渚誰言我最閒正爾心獨苦水口橋堪度林間屋尚留秋來山色好相對有歸舟茅屋何人住秋林晚對山也知乗興出多在白雲間題畫菜二首緑酒交春熟燈花入夜開雨畦堪小摘不見故人來今日荷鉏倦嘉蔬没四垣客來春酒緑風雨夜開園題竹梅便面舞罷霓裳曲相逢月下還髙情倚修竹翠袖不勝寒題翎毛小景紅子秋樹老黄花晚節寒幽禽雙白頰托爾一枝安鷃雀小羽翼幽栖短棘梢叢坡風日好不讓鳳鸞巢六言絶句題畫春雨青山漠漠晚樹白雲悠悠若非輞川莊口定是浣花溪頭滄洲芳草初緑别墅山花正開借問一蓑烟雨看山何處歸來子猷無乘興舟越石有長嘯樓雪滅千山蹤跡月照幾家樂愁七言絶句題温日觀葡萄葡萄壓架水晶寒枯坐山僧出定看露下空庭凉月墮斷雲星斗夜闌干却看仙佩萃霞裾又似青鸞下碧虚夜半蕋宫秋月白小龍和露養𤣥珠題髙房山畫房山在金陵作此畫寄歐虞二學士二公皆留題其上尚書好畫江南住寄與題詩兩翰林千古髙情俱妙絶至今春樹暮雲深題盛子昭畫空山絶壑懸崖髙一塢白雲如海濤幽人抱琴無路入松風落耳聲蕭騷題畫六首樹折雲梢浪拍窓老漁齊放釣船雙不愁江上風波險平地風波險似江沙草青青近石磯磯頭疎木轉斜暉孤舟釣叟埀竿坐逺岫雲飛帶雨歸東南山水足清暉茅屋楓林共石磯誰坐扁舟沙際住也知江海客忘歸松林日落碧雲開野老溪頭坐石苔隔岸好山招不到一篙流水待誰來緑陰黄鳥暮春初谷口人家樹下居野老携琴度橋去雲山深處更何如畫號為真理或然悠悠覺夢本同筌殷勤封向青山去要識江東李謫仙西原北去城十五里半山之上下望卧龍潭山分巧勢疊玲瓏烟幕雲屏閟幾重有竹參天長鱗角欲陪髙卧碧潭龍題趙大年林塘秋晚圖老景黄花筆底收晴鳬冷雁共汀洲王孫畫學空花竹不到銅駞陌上秋春深即景露梢黄鳥啄來禽蛀葉青蟲絡樹陰又是緑堦春雨歇滿庭芳草落花深滴滴泉在歸宗院前橋下依石壁水滴滴下坎井中不同瀑布瀉千山數滴空餘坎井間端是龍神閟珠味故教滴滴與人慳山南瀑布不一然捨谷簾外則稱之逺望如一白蛇𣺌𣺌穿翠林而下河漢遥分一派輕望中𣺌𣺌白蛇形誰教來自半天上穿破千尋碧玉屛馬尾泉在開先瀑布之北同一山相去四五步遥望水下僅尺許若一尾也短流色白燦瑶光穿破山腰一抹蒼多少遊人來又去從教袖裏有鞭長題秦淮送别圖白下春波照緑灣踏船送客出龍關離愁不逐江雲没江上雲還人未還緑酒斟來且莫斟酒闌歌罷去駸駸别懐恰似秦淮水流到長江緑更深題牡丹士女圖樂府梨園曲慢裁内家新奏牡丹開下堦立得花陰轉李白承宣詔未來
