body:
  text: 臨安集巻四明錢宰撰記陳氏聽松軒記岀江陰城東行十里許有山焉曰綺山有溪焉曰唐溪溪之水與大江接負山面溪有宅一區長松萬樹林立後先曰國子陳生謨世居之謨嘗於所居東偏築一室日燕坐白石上溪風岀壑天籟下林初謖謖有聲倐焉如絲忽焉如簧如金如石如鳴和鸞如鏘佩璫其少從也如大鏞其轟如賁鼓其鏜如風雨驟至濤起岸拆奔鯨沸而怒蛟翔翕然而止如斷如續如貫珠纍纍而鏦錚企而聽之神清思寧暴戾消息鄙吝不萌而髙明貞白之操油然而生其所以感動於中者如聆廣樂而聽韶章焉因名其軒曰聽松而謁余為之記余惟聲音之接於耳也于以蕩滌邪穢流通精神養其中和之徳也固非若口之於味目之於色而已然至味先太羮正色尚純白魚與熊掌非不足以悦天下之口君子不尚焉嬙與西施非不足以悅天下之目君子不尚焉而况耳之於聲其感人深又寧不慎所尚哉秦筝趙瑟齊竽燕筑桑間濮上之音非不足以悦天下之耳然而淫哇沈佚嘽緩噍噭聽之使人流沔以亂倫慢易以凌節寜可接於聰明以蕩其心邪吾知謨之聽松殆亦慨世俗之音不足聽於耳而雅頌之作所以形容盛徳歌詠至治之休者又非山林之士所得聞也於是燕處松下境與趣適髙林風生清聲落耳因得以澡雪其情疏瀹其氣以涵養其徳性其有得於中者如此故今雖入冑學習聞䕫章方將見用於時以宣治世之音而猶不忘洗耳於松風哉陶氏聽松軒記會稽陶仲淵氏尚志執操其學可以用世然知富貴不足慕遂樂閒曠有逺祖貞白先生之風貞白嘗特愛松風故仲淵亦名其軒曰聽松介清河張孝本徵記於余余聞軒在鏡湖中洲洲有古松數百千章上干雲霄下蔭坻島倚松而環視則香爐玉笥秦望諸峯列其南而北東西咸濱江海其波光滉漾欲浸几席而空翠藹鬱飛墮庭户自外望之若神仙居焉舟楫莫能至實越中山水竒勝之㑹有足愛者仲淵則尤愛聴夫松風也盖仲淵既以閒曠自適不與世伍而獨伍於松松之磊落挺拔如髙人碩士負才不售卓然有立仲淵盤桓其間意既有合而微風忽動松輒振聲又若與仲淵相對語者是以仲淵起居食息惟松風乎是聽然聽於無聲則天地間何莫非松風哉因聲生聽則松風固獨有在於兹軒也風非松無以寓其聲松非風無以變其聲故風至自東則松之聲和以柔風至自南則松之聲暢以達風至自西則松之聲凄以厲風至自北則松之聲猛以烈至於八風齊動乍大乍細乍疾乍徐盤旋太虚其為聲也或髙或下或清或濁或疏或數而成音焉是則宫商宣而律吕諧鏗鏘而金清越而玉嘽緩而絲噴薄而竹喧呼而匏鞺鞳而革音聲翕繹若韶武並奏使聞之者心悅神怡宛在於虞周之世而不知處乎遐陬僻壤也此仲淵之聽松風而有慕於貞白者如此然貞白嘗辭禄掛冠居三層樓而所以愛松風者豈徒然哉貞白早得仙術視青雲白日不覺為逺在仲淵有御風逺遊之思而後可以聽夫松風也貞白讀書萬巻一事不知即以為恥在仲淵有窮理盡性之學而後可以聽夫松風也貞白隠居山中而梁武以事諮之在仲淵有經綸之才足為世用而後可以聽夫松風也貞白以士大夫談𤣥理而忘武備作詩諷之在仲淵有諫争之才以振頽風而後可以聽夫松風也然則時仕則仕未嘗固其位時隠則隠未嘗忘乎世此貞白出處之大致仲淵能象之則仲淵之聽松風也誠有同於貞白之所愛哉夫既同貞白之所愛則其出處之大致亦宜有同焉耳矣仲淵故翰林應奉夏先生叔通之甥壻其學盖有所自云愚軒記知孟與公孫樸同處於勾無之村知孟曰善哉公孫子之安其愚也吾將絶慮去知黜其聰明請締交於樸也遂相與為友而勾無之里人概以愚稱之里有應仲子者過之問曰某也觀二子之得於天也賦異爾形禀異爾情或智而明或樸而貞胡為乎皆以愚稱公孫樸囅然而笑曰大塊範我以樸甄我以素錫我以鈍吾固知樸者可琢素者可飾鈍者可礪也將勉强而琢之且為顛為蹶將勉强而飾之且為汚為湼將勉强而礪之且為毁為折吾寧渾渾沌沌守芚抱拙以全吾天也吾視世之人狃詐頡滑險詖桀黠知足以落天地巧足以雕萬物辨足以簧鼓天下之人心及其技窮術殫攖禍患而罹戮辱者皆是焉故寧守吾愚而不敢妄有所為也仲子曰公孫子之愚則聞命矣知子之知天下莫加焉而亦以愚稱得無出於偽乎知孟曰嘻知之與愚皆天之所錫與也子安知愚之非知耶子安知知之非愚耶儀秦辨矣吾且鉗儀秦之舌獨不得旋其天於黙耶􅚽石巧矣吾且袖􅚽石之手獨不得復其拙於天耶管晏知矣吾日斂管晏之知獨不得反其樸於天耶今子徒知公孫子之愚其樸也天範之其素也天甄之其鈍也天錫之孟也斂其華而從其實韜其光而就其質其處也若不知有思其動也若不能有為孟之愚庸不本於天耶孟之與樸也交其愚將無同乎應仲子喟然嘆曰知子其甯俞之愚乎公孫子其羔子髙之愚乎子髙與我同類者甯俞之愚我願學焉因築一室於勾無之南安里扁曰愚軒願締交於二子而請予記諸軒上止善齋記會稽之都亭市友人孫正心世居之正心懼市道之移人也進其子璉而戒之曰吾聞晏子有言小人近市朝夕得所求吾弗之取也爾所求而止於利斯近市之習也爾所求而止於善焉斯無愧於近市矣小子識之因命其進修之室曰止善璉退而自勵求其義弗得也挾冊過里門西謁伯均子予而問焉伯子獵纓危坐而告之曰子來前人物莫不各有所止也虎豹止於深山蛟龍止於重淵鸞鵠止於髙林况於人乎民止於畿農止於野工止於肆商賈止於市子居市子見於市之大賈乎山東之漆絲南海之珠璣巴之巵卭之竹蜀之丹砂代北之馬羊旃罽若水之趨壑不召而自來日夜無時而休焉誠以所止者市也嗟夫商賈之所止者市也利也君子之所止者性之善也居而事親止於孝焉性也出而事君止於敬焉性也以至於事長而悌處友而信處民而仁處物而愛皆善之止於性然也夫豈若漆絲之出於山東乎夫豈若珠璣之出於南海乎夫豈若丹砂巵竹馬羊旃罽之出於代之北蜀之西巴卭之外乎若然則士之止善尤亟於商賈之止市矣古之人觀解牛而知養生焉觀斵輪而知讀書焉今子之居近市觀於善而知止善之道焉何近市之愧哉璉再拜而謝曰敬受教矣歸而過庭請以先生之言誌諸齋居之壁深造齋記山陰上舍生馬文炯讀書于燕處之室邑文學陳先生伯善過之嘉文炯之篤志于學也名其齋居曰深造盖取諸鄒書深造自得之語文炯日處乎其中將務于深造又慮無所庸其力將安於自得焉則無底於成求其義弗得也造余而問之余見今之為弟子員者不荒于嬉則躁于進而生獨知所勉焉可嘉也已因為之言曰嗟夫君子之務於學也非迫而求之之難惟不知深造之患非强而致之之難惟不能自得之患獨不觀夫鸞鵠之戾于天也扶揺而起其翔也彌髙鯤鯨之潛於淵也游泳而去其逝也彌深騏驥之騁于康莊也馳驟而前其至也彌逺油然而翔油然而逝進進不己而莫不各得其道焉使不得其道且將齟齬扞格而飛者墜游者没而馳者蹶矣尚何得以自適其適哉君子之學亦若是也必也潛心乎性命道徳之域涵泳而弗忘優游而弗迫日從事乎進修而弗之止息則所造者深而不知道之得於已則所處者安所資者深而取之左右逢其原盖無往而不得其道矣然則君子之自得皆由深造之功有以致之也他日孟子之言又曰必有事焉而勿正心勿忘勿助長也盖必有事而勿忘則所造者深矣勿正而勿助長則所得者皆由於自得而無所庸其力矣彼不知是道者求深造而或失之正助欲自得而不知必有事而勿忘夫且孟軻氏所論造道進修之方乎古之人觀解牛而得養生焉觀斵論而知讀書焉吾乃今觀於鸞鵠之飛鯤之游騏驥之馳而得深造之道焉因為文炯記書於居之壁知止齋記八年冬詔天下士凡寄跡佛老而有志於聖賢之學者入國子學俾習知天理民彞然後授之政焉余助教庠舍間因獲與諸茂異交閒過尊經閣訪黄君伯厚於東序伯厚扁其齋居曰知止噫伯厚逃佛而歸於儒不半載而知所止矣何其化之速耶方今國朝武功既成誕修文教示之以綱常導之以道徳化之以禮樂禁之以刑政將使天下之士皆知堯舜禹湯文武周公孔子之道將使天下之民皆被堯舜禹湯文武周公孔子之化以世之學佛老者往往多聰明識道理俾務于學去其虚而實踐變其寂而有為黜其偏而歸於中正猶反手耳然而堯舜禹湯文武周公孔子以大中至正之道化天下後世俾修諸身措諸事業莫不各有所止之地也是故冠爾以章甫使知首之所止也衣爾以逢掖使知身之所止焉正爾以夫婦復爾以父子明爾以君臣使知心之所止焉伯厚於是乎𤣥冠綦纓俯仰後先以正其容貌以齊其顔色埀紳委佩周旋抑揚以敬其儀刑以慎其進趨入其室則夫夫婦婦怡然乎其和樂而有别也升其堂則父父子子懓然乎其慈孝而有親也出而仕於朝則君君臣臣秩然乎其明良之際會而有義也伯厚方且見之躬行矣其視前日祝髮毁形滅性離倫違世獨立而出萬物外者夫豈伯厚之所止邪嗟夫北辰之止于天也不偏也流水之止于海也不息也心猶辰也静而不偏則所止者正矣心猶水也動而不息則所止者至矣伯厚尚無惑于偏無怠于志庶幾乎終始慎其所止哉白賁齋記夫天下之至文無飾也天道無為而日月星辰麗焉地道無為而山川草木麗焉聖道無為而禮樂典章麗焉使天地聖人有所造為而然夫豈天下之至文哉上古之世大樸未散不動而敬不言而信無為而化而至文已寓於其間矣及夫淳風澆龎俗漓施之以青黄加之以丹雘而正色亂淆之以金石亂之以絲簧而大音隳矣和之以甘辛調之以鹽醯而五味失矣飾之以雕文刻鏤紩之以黼繡纂組而大樸散矣任之以才智技能運之以精神巧力役之以思慮營為縱之以好惡驕矜誕慢選愞奊詬悲愁逸樂而天下之文始侈靡潰爛汗漫不可止約而忘其性命之真矣是故聖人出而化天下將以復其淳焉大禮必簡大樂必易大圭不琢大羮不和尊之尚𤣥酒也俎之尚生魚也簋之告燔炙也貴飲食之本也樂之尚􅓗籥也貴其質也輅之尚越席也尊其稱也莞簟之尚藁秸也羃之尚疏布也器之尚陶匏也莫不樸素純懿渾然天成不假琢飾不藉塗塈不事修為施之禮樂典章誠敬是將可以假於天地可以交於神明可以感於人民事物非天下之至文孰將與於此哉臨海有洪原羽者篤學而尚質疾世之文勝而侈靡也扁其齋居曰白賁殆將馴致夫文柔成賁之象而不使過於文焉故余道古昔聖人至文之寓於樸素者告之雖然至文無飾惟聖者能之聖人法天地之至文君子固未易至也傳曰衣錦尚褧惡其文之著也君子將不得以聖人為法哉博文齋記會稽沈如心以先世藏書之富也名其齋居曰博文謁鄉之先生長者而求其説矣復請予為之記余復之曰博文哉天地萬物之彚古今萬事之殊將以一心縱觀而洽聞焉雖智如管晏勿能窮勇如賁育勿能極行如冉閔勿能周辨如儀秦勿能志古之人顔氏之子其殆庶幾乎其言博我以文盖服膺聖人之訓而勿失之矣余也勿升其堂勿嗜其胾者也何足與語博文哉風霆日星天之象也海岳河江地之儀也鬼神之著也草木禽獸昆蟲之微也文之麗乎物也禮樂政刑國之經也綱常倫理民之行也古今之運也升降抑揚進退之節也文之麗乎事也六經子史百家之言文之麗乎書也六經之文合天地萬物之理備古今萬事之情而無不載焉故君子欲窮致夫事物之文舍六經何以哉本之書以求其實本之詩以求其情質之禮以驗其常稽之易以窮其變考之春秋以明其邪正㕘之子史百家以别其是非得失於是而充焉擴焉使天地事物之情無不博焉則庶幾矣徒藏書之富無益也雖然是文也窮于天極于地散殊于萬物布列于經史傳記百家之言而理則具于人心徒博文而不知約則汗漫而無所要歸矣故傳言博文必歸之約禮云或曰子言博文惟顔氏庶幾若後之人勿可及者終為如心言之又若是其備何也噫顔何人哉在如心之勉焉耳三畏齋記古燕達魯時中之為御史也循理法慎操守每自公而暇退處一室兢兢焉不敢以燕休而少肆焉余因善之曰美哉乎御史君之持敬也盍亦致其戒辭焉時中因祗懼以自警曰惟天生人全賦所性爾弗克敬慎于厥躬其何以自立於天地間邪余曰善哉持敬之道非一辭可盡也戒言必再時中復祗懼以重警曰惟天子命俾爾有位任風紀之司爾弗克敬慎于厥職其何以盡為人臣之道邪余曰善哉持敬之道非再辭可盡也戒言必三時中復祗懼以重警曰惟古昔聖人有典有經俾爾有所持循爾弗克敬慎于厥衷其何以至於聖賢之學而修諸已邪余復善之曰美哉御史君之持敬也警戒之辭至於再至於三無非欲盡其敬畏之道也可尚也已時中作而曰吾聞君子有三畏畏天命畏大人畏聖人之言請以三畏名齋子其為之記俾知所警焉嗟夫惟天地生物其賦予之妙獨全於人士君子生天地間可不念賦予之全而祗畏于天乎然賦予固出於天而代天理物撫有萬方有世之聖人焉法天垂訓著之六藝有古之聖人焉又其可不祗畏之乎今君之燕處也恒戰兢惕厲著之戒言可謂能致力於仲尼氏三畏之道矣雖然道寓於物莫非天命而獨重之以大人聖言者舉其大者言之耳士君子知畏天命則不得不畏之矣彼無忌憚者乃或不能盡夫祗畏之道天與聖人固弗察察也而天道之明或不得而辭其責焉彼烏知君子之敬畏哉
