body:
  text: 臨安集卷一明錢宰撰五言古詩分題賦載酒亭送友之四川大江發巴蜀岷峨鬱嶕嶢子雲性佚蕩逸氣相扶搖灑翰騁雄辭凌雲何飄飄終焉斂其華富麗不足驕覃思著玄文斟酌倣繇爻間言極幽微綿絡天地交豈無好事者載酒與遊遨胡為事黃門投閣竟蕭條龍蛇不知藏蝘蜓亦見嘲天獨昌其文炳如星日昭子行登斯亭英爽或可招謂我欲問竒峽水阻且遙奉萱堂為張朝宗賦阿母初哺兒階前種宜男種之欲忘憂恨恨不能堪夫君竟長逝花開為誰簪兒飢須蚤耕兒寒須蚤蠶教兒讀父書經史長窮探兒今八尺長母髮白毿毿上堂問起居下堂具旨甘幽花遍堂北旭日照堂南何以報母慈持此寸草心石泉山房白石何齒齒幽泉復泠泠十年來京邑逺此林壑情取琴為我彈彈作澗下聲涵雲出細竇懸響潄瓏玲奔流激淺瀨飛沫濺瑶瓊峻如傾崖急怒若過峽驚回淵阻雲根水澀不得行衝破歘奔放奮迅如建瓴委蛇及水鏡擴然猶且清雅操得真趣餘音繹以成揮手未終曲悵望故山青泉石無遐思興樂在廣庭題燕喜亭髙堂白日迥芳辰何熹微渚風變林花春草緑已滋流光惜易邁歡娛及良時子奉堂上親翁引花下兒大婦主中饋小姑納巵匜升堂布綺席嘉賓來何遲華筵理妙曲秦筝雜清吹玉珧列海錯烹羊間熊胹酒至輒盡觴怡然樂天彞尹父方靡盬魯侯亦奚為嗟彼軒裳者極宴忘戚悲軒裳豈不樂我醉不復知題濯足圖驅馬西略地行至雍丘南歇鞍踞床洗龍歆氣何酣傲岸濯秋水兩姬手摻摻酈生􅂒門入長揖不下拜髙視挫其鋒踞見吁可詫幡然敬爾容攝衣起言謝顧惟雄武姿慢罵空無人于焉下狂士屈若志不伸髙明藉柔克四海歸堯仁題觀漁圖龜蒙荒大東洙泗揚其流金碧何峥嶸臺殿居上頭命駕出山澤陳魚樂觀遊縱橫列九罭出沒翔萬艘懸罾雜數罟中有嫠婦罶大魚拍波起小魚不得休盡利攘其民安得視獮搜臧孫豈不賢明珠慙暗投題曕雲軒南山一何髙孤雲何珊珊朝看雲出林暮雲復歸山雲歸已復出遊子何時還迢迢雲舍逺可望不可攀持杯不能酌悵然起憑闌題徐子中積善堂十月風露交履霜變重陰密霰日已集堅冰日已侵往者既有漸來者方自今君子契天道晨夕返吾心樹德當務滋卷勺能髙深文言美餘慶保此以為針藹藹嘉樹林繁陰散華第俯看雨露滋仰見雲煙翳昔人手中植嵗月今莫計寸根蟠地維尺幹起天際物理庶可廣人心貴能繼朂哉賢子孫積善期弗替題生意垣詩大鈞運元化生物蔽寰區春陽播仁澤靡不在有初飛走咸鷇麛勾萌日敷舒良馬信倜儻寧不顧其駒朔禽摶雲霄亦復哺爾雛眷彼嬰孺兒慈煦亦已劬世無咸陽醫何以寧其軀張生守環堵種藥周四隅鬱鬱生意滋元氣同扶輿誓將扶幼孩永與耆艾俱安得攄爾懷夀域躋黃虞城南燕集閉門度芳辰念此風雨惡今日忽復晴青郊縱行樂引杖聽鶯啼持杯看花落庭緑樹陰交春容已非昨微酣愛酒清放歌悲髮白茫茫師旅間擾擾煙塵隔夙昔愧栖遲于今喜離索明朝溪上田買牛自在作己亥嵗避兵中原喪亂起羣雄遍江河我行江之南亦復罹兵戈親戚相奔竄閭里傳驚訛一朝聞寇至攀騰上岩蘿路逢偉男子負母匿山阿弱婦行不前縊死枯樹柯豈忍棄爾死救爾如母何聽此欲援之山下寇已多行登寂髙峯天髙鬱嵳峩悵然思匪風吞聲不成歌兵退後作朔風號枯枝長夜何漫漫微月出復沒零露凄以漙露漙不足悲嚴霜為之寒飢烏下叢薄猛虎鳴其間鬼燈照虛館落葉何珊珊蕭蕭逺征人載歌行路難我心增慘戚豈不思東還欲濟川無梁中道多阻艱弱子病且死老妻方憂患明將登前途念我衣裳單斧冰汲澗水采薪事朝餐慨彼下泉詩悠然起長嘆釣臺濺濺桐江瀨白石粲如許上有子陵臺下瞰富春渚髙崖薄層雲黃草沒荒墅俯懷漢中興四海歸寰宇徵書詔遺逸長揖覲當寧咄咄吾子陵而竟不下汝握手道故交言還謝明主星文麗中天風節超下土悠然釣澤中髙風永終古陪白野太守遊賀監故居得水字崇岡散新陽寒日舒短晷晴飈一披拂波影上沙尾意行遂忘疲情語相慰喜賜宅知已非歸舟更誰艤樹暗山始夕川明月初至停杯成慨歎覔句聊徙倚前林樵唱來驚鴻下寒水贈夏道存日月行中天會朔自有期江海各一方合流豈無時慨彼君子交良晤何暌違子昔西江來訪我東海湄載酒笑賀狂探書慕遷奇别來三十年彼此更亂離會合齊未卜音問兩俱稀倐焉際文明見面交相疑君顔昔如玉我髮今若絲感此繾綣懷峩冠竟言歸毋為歎衰邁少壯夫奚為贈樵隱處士樵者本在山隱者亦在山雖言事不同並依林泉間晨興持斧出捫蘿與躋攀向夕負薪歸落日同掩關流水石上至白雲山中還老樵竟何之我獨忘朝餐題雪獵圖胡兒善騎射出獵古戰場白雪日夜飛蕭蕭朔風涼黃草蔽沙磧馬肥弓力強小隊出漢南十騎如龍驤前驅逐猛虎後騎接飛獐翻身激羽箭疊中兩羚羊玄熊何前却猛氣亦跳梁南行顧長戟北走脫飛鎗聫鑣愈奮捷性命不得將自謂足馳騁意氣何揚揚寧思漢廷將英勇際武皇去年出雲中置郡定朔方今年戰髙闕夜圍右賢王小勇何足矜萬里開邊疆七言古詩昨日行并序溫一中老而學仙骨不可解唯日縱飲以自樂其樂達生之士也作昨日行贈之昨日日沒黃金盤今日日出丹砂丸丹砂可鍊黃金可摶仰看白日沒復出安得與爾遁還天地終無端東望扶桑枝西極若木柯夸父渴死莫飲于河魯陽戰酣手揮其戈何曾凌倒影走滅沒亦莫却飛光扳羲和青天萬古旦復旦北斗日夜如飛梭溫一中可奈何骨既不可解鬢髮颯已皤那能學安期生出入太清家煮汞成白雪采鉛鍊黃芽玉爐火溫溫鼎上飛紫霞飢餐日之精渴飲明月華玄關直探造化始元氣與之同邇遐溫一中可奈何不如猛飲酒髙唱歌笑吹紫鸞笙醉舞白玉珂日日爛醉不願醒便似阿母西池上曉宴蟠桃花題孔正夫迂隱軒貧不過富兒門達不謁達士廬達士笑我隱富兒嗤我迂所性倦俯仰闊焉與世殊野服謝簪紱衡門薄軒車對酒不解飲乃與陶潛俱朝采籬下菊夕釣江上魚榮名如浮雲富貴非我圖隱顯吾不知迂叟方著書天遊方丈歌子好遊乎吾語子遊魯連抗節東海陬倜儻有策輕王侯北遊邯鄲救全趙秦兵解圍不得留彎弓射書固燕士猛將吞聲甘斫頭笑揮千金賤封爵但令四海竒其謀馬遷有才生龍門逸氣旁礴橫乾坤南遊江淮恣竒覽江水萬里來峨岷會稽神書封禹穴金匱石室赤手捫周南留滯何足較青史萬古雄其文雄文錯落紛天章上與星斗爭光芒竒謀偉略驚人世風霆變化生開張吁嗟竒士不復見但見龍門之下已黃土東海之水今成桑文亦不能騁其氣謀亦不能施其長功名事業竟何益壯遊之迹成荒唐不如學仙子一氣凌紫霞尸居在岩穴天遊邈無涯朝登泰山望滄海手攀扶桑餐日華夕休華嶽渺西極笑呼金精牽若花閬風瑶島河淺清崆洞具茨非杳冥倦遊歸向山中室方丈倣佛如蓬瀛廣成子安期生與爾逍遙太霞表一洗人間萬古情豫讓橋太行之西古有豫讓橋我昔過其地馬嘶不敢驕黃雲暗天雪欲飄白日慘慘風蕭蕭薄寒中人思栗憭烈氣黯黯萷晴霄豈其鬼不死精爽若可招我思趙襄子既滅智伯瑶朝焉漆其頭暮焉褻以溲讓也憤知已怵焉思報仇千金買匕首變姓為刑囚入宫塗厠逞雄略誓刺趙孟不得成其謀脫身幾何時忠義慨莫酬鬚髮脫落癩以髠口吻吞炭聲啞嘔變形行丐妻不識仗劔伏匿橋之幽一朝襄子駕車出駟馬駭躍驚鑾鑣於焉重歎息豫子誠好修智伯死無後而子為復讎我方義爾不爾尤爾不我刺將何求暗嗚叱吒索趙裘拔劔三斫血為流反手自剄委道周下報智伯死即休噫戲吁豫橋黃草煙未消中條積翠髙嶕嶢我思昔遊心搖搖披圖為爾歌長謡嗟哉趙孟不再脫爾死要使萬古貞烈齊中條晚牧圖牧牛兒日日飯牛在牛下春草青青秋草黃牛背夕陽長在野幡然應聘力田科不復騎牛學騎馬牧牛兒長年看牛牛下飯賣身不賣五羊皮扣角休歌白石爛長安有客方倦遊不復騎馬歸騎牛谷簾泉并序谷簾魑天下泉鴻漸有經刻惠山水致逺經年不壞惜去軍之逺步涉﨑嶮古今名公少到以是無留題僅有夏倚一記而已自城西北至景德觀四十里自觀涉六七澗穿林而行越十里渺然見泉自山下未足取也又二里上山傍枕懸崖後推前挽支藤而上又一里下坡有澗踏亂石穿崖壁又百有餘丈至簾下少憩回視一簾如瓊瑶珠瓔從天碎落恍然非人世間也星江志云其流凡三十派橫澗七丈是矣然秋冬水涸泉下不多春夏太潦澗石漫漫又不可涉惟盛夏得雨後兩旬則簾水可觀澗石亦出可涉可坐也因夏視陂塘而往適得其時與同行坐歌石命飲而詩之風捲河潢翻玉液段雲散雪瓊花密分明放下水晶簾埀埀若護蛟龍室躡空捫蘿坐歌崖林暗暉暉山外日晚風泉聲雜松吹百鼓爭嗚間簫瑟山南山北知幾泉凡派常流我非匹惜哉前哲不特書僅留一記夏生筆賴有陸子狄牙口髙下品題曾不失君今試看錫山碑天下何泉居第一全貞堂妾心葉上露葉落隨葉去妾心鏡中月鏡破隨鏡缺月缺在天不再圓露下化作秋霜妍孤燈孀館三十年夜夜夜績髙堂前教兒讀書霜月懸照見白髮孤貞全題趙仲庸鏡湖圖為洽上人作趙侯胸中有泉石白髮埀顛人不識丹青不寫四十年一見洽師雙眼碧當年王宰浪得名十日五日勞經營天機到時一揮灑白雲顛倒秋波明秋波在屋下白雲在屋上香爐秦望天東南蒼巒翠巘森相向三山落日煙水賒秋風舊宅今荷花斷垣蒼石無路入至今人説放翁家放翁家渺何處阿師出家不歸去不惜千金買畫圖笑倚清江看雲樹方壺小隱方壺之山上有不死藥可以鍊金丹乃在閬風之東員嶠之西滄海每岸非人寰自從秦兒入海去不許海若通天關長鯨蒼虬互出沒天吳九首扶狂瀾方壺可隱大藥可餐海水清淺海路險艱山人學仙竟欲往欲往不得空長歎歸來傳得壺公術平地幻作方壺山一壺顛倒懸藥室日暮竟入壺中間壺中一宇天地濶白日不夜長無端安得相携費長房同入壺中問大還山峽圖大江水落岷峨西三峽上與浮雲齊飛湍奔騰下絶險怒與石鬬如奔霓君不聞灔澦如象瞿塘莫上灔澦如馬瞿塘莫下黃牛劔石真龍阿巫峽之口雙盤渦蜀山五月消盡太古雪倒瀉銀漢翻秋波江聲出峽經險窄險似龍門砥柱當黃河西川賈客何危哉樓船萬斛天上來船家放船一失手桅折柁裂為之摧此時命不自保嗟彼吳鹽蜀錦那得利吾財利亦不足美名亦不足言伍員終賜鐲鏤劔江上鴟夷空復憐李斯卒棄咸陽市上蔡黃犬不得牽古來名利總如此豈特瞿塘下峽船泠風臺列御寇御風而行風泠泠手摶扶搖足躡凌兢旁礴造化噓吸元氣精超然憑虛上泰清逍遙八極表飛步入杳冥但以息相吹何必羽翼生飛廉前驅意遐征鸞鵠不駕雲為輕去因風送回風迎回戲迎不歸來至今學仙人望之泠風臺雙烈行雲中兩烈婦風節何雄哉婦姑誓同死軍馬倐已來姑言我死命之遭爾方年少不得逃欲自經不得索欲自刎不得刀少婦潛致辭不用刀與索兒當激賊怒與姑頭共斫姑如湛盧劔罵賊獵獵徑剛風婦如黃間弩蹶張放弦氣愈雄厲聲奮激膺賊鋒萬古雙烈誇雲中龍劔謡題延平劔去圖雙龍劔雙飛幾今古乃是莫邪之夫干將之婦金鐵未流時大冶交龍虎鑄得龍泉及太阿光怪或分終復聚自從豐澤斬秦妖鴻門翼楚舞三侯歌其雄四海加其武大風颯颯日色黃雲氣從之天下雨一朝奮鬛飛上天萬里扶搖竟何許虹光夜夜斗牛間豐城陸沈暫一還乃知變化終莫測神物豈久留人寰或云張公亡大雷死小雷佩之行江涘腰間寶鞘聲鏗然兩龍復合延平水延平水深復深在天逐雄飛在海逐雌沉四海大一統五兵不敢侵鎮國家安邊陲神劔長為龍虎吟題畫梅和王山農韻并序王煮石梅花一枝系以長歌幾四十年矣俯仰今昔有懷故人因次韻于後但顛倒縱橫不倫不理不能不為韻所牽也觀者必發一笑江南春來白雪爛落月橫參夜將半縞衣綽約如故人踏風梨雪敧老幹北風獵獵天正寒倣佛風節憑西闌乃知山人竟不死夜煮白石青松間髙情撫世無今昔溪上梅花沒荒棘憶曾揮翰灑溪雲一枝寄與春消息花前喚酒寫長歌花下呼兒掃落花若不揚州何遜宅定是西湖處士家山人愛梅心獨苦笑爾豪吟玉堂樹山巔水際日看花鳳詔鸞書招不去解衣盤礴兩袖埀腕指所至皆天機南枝著花玉色起北枝凍壓玄霜飛自從上苑成塵土無復當年舊歌舞源上桃花不記秦九畹芳蘭已忘楚不如山人卧雲松破屋長在梅花東傳家别有花作譜放手直欲先春風見花如見山人面誰道人間亡是公鴈南飛黃梧井邊鴈南飛萬里玉關人未歸孤燈搗練江南婦霜落空階臂酸楚寒衣何日到關西敲斷秋風石無語題長江霽雪圖昔年壯遊下江漢霽雪千峯排兩岸今年看畫憶舊遊萬里江山入清玩岷峩岡脊來蜿蜒青城一峯髙插天東馳衡山走千里匡廬五老與石城北固遙相連冰巒雪壑互起伏照見日華破初旭神光混茫元氣浮奮如巨鰲簸坤軸爛如秋空雲浩如滄海濤又如瑶臺銀闕天上頭皎皎白月空秋毫回光下照中流水風吹河漢銀雲起中流空濶不勝寒一洗丹碧秋漫漫山川歷歷真偉觀來往十年遊未半不如雲瀛樓上來倚闌一日看遍江南山題蕃王出獵圖燕山八月秋草黃秋髙馬肥弓力強蕃王朝辭詐馬宴羽獵不敢齊長楊西風獵獵邊城戍小隊旌旗打圍去英姿颯爽思奮揚面如玉盤身倚樹金羇朱纓玉腕騮紫貂兜鍪銀鼠裘燕姬如花向前騎從官騎列春雲浮猛士先驅仗金鉞胡笳一聲鼓齊咽驄駒並載雙歇驕海青翻臂思超越黃鬚健兒勇且驍虎紋交韔懸在腰翻身控弦響若掣一箭射落雙飛雕馬上雙雕馳獻捷凱歌向王王擊節金杯進酒飯黃羊馬潼淋漓手新捩穹廬張天落日黃醉擁嬋娟馬前歇百年富貴空畫圖桑田茫茫海水枯畫中豪傑八尺軀昔何勇鋭今何愚悲風蕭蕭渺絶漠漠南千里王庭無秦淮晚泊秦淮酒家來泊船鱸魚一斤三百錢船頭買魚酒新熟却憶邪溪歌採蓮醉來起舞落日晚揮手彈鋏風泠然少年不作長安客老去逢秋頭雪白興周須求渭水才安漢園公安在哉眼花齒折竟何益好放陶潛歸去來早春寄鄉中友故園花發春又來碧桃半拆棠梨開流鶯踏花酒落杯花飛落酒相縈回酒酣起舞落日晚應念長安人未回江上船幾時發拍手醉唱歸去來笑摘花枝簪白髮採桑女吳桑葉盡吳蠶老吳姬採桑顔色好玉叉半脫雲鬢偏一雙蛾眉曾不掃桑間桑扈鳴交交少年莫把金丸拋小姑摘繭歸當繅題董太初畫時太初客死天台有客泊舟滄水灣卧吹鐵笛非人寰小溪白石亂如齒平地雙松髙似山丹丘赤城久為客沃州天姥何曾還嗟哉董生不復見安得致身圖畫間題萬峯閣越山四圍吉祥寺紺碧殿閣生煙霞真人丈六金粟像大地萬朵青蓮花常時飛雲若縞練近午出日如丹砂上方絶頂無路入避地頗似秦人家宅德民雙竹此君一本森雙幹恰似孤竹生夷齊清風節操終並立明月環佩長相携或騎兩龍齊上下又挾蒼鳳隨髙低何當聨鑣入雲去玉笙吹向瑶池西題學圃軒門前瓠子青纍纍韭黃菜甲皆可蔬荒泉入畦夜雨歇落日滿屋幽人居養生且復樂樹藝避地自可同樵漁只今出處與古異勿謂老圃吾不如
