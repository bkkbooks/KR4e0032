body:
  text: 臨安集卷三明錢宰撰序㑹試小録序洪武二十三年冬十二月初吉皇帝御奉天殿詔天下三年大比賓興賢能明年春合天下士會試于春官于以廣四海同文之治也于是內而邦畿外而藩屛侯甸東極青齊西踰川陜南際荆吳閩廣北至于梁晉宋衛幽燕合十二道之士凡六百五十人來會于京師欽明詔也先是命禮曹聘天下章逢耆艾俾司校藝及期又命翰林學士劉三吾俾典文衡修撰任亨泰同考試春官二卿張智董行試事而監察御史張存中韓傑監臨焉于是濟濟多士峩冠埀紳趨蹌後先相與試藝于春闈中選者得三十一人既撤棘禮曹議刋小録以紀盛典內翰先生既序于首簡復俾宰為之後序宰惟諸俊造之登名于天府也固操履修諸身道藝信于人而獲與是選矣夫以士君子之散處四方而操履無間焉則天下之同倫可知矣相去萬里而道藝無間焉則天下之同文可知矣雖然書之同文行之同倫固國家大一統之治化為士子者遭逢盛時仰掇髙科固將有為於世矣聖明在上方且以臯䕫稷契期望天下士諸君子毋謂古人為不可企及尚思所以修諸身者施諸天下國家以佐聖世文明之治以毋負所學江西鄉試小録序聖天子既武定天下乃誕敷文教蓋將以六經之道致天下之治也夫六經之行世易以道陰陽書以道政事禮以定民志樂以和民情詩之作也風以著習俗之盛衰雅以明國家之隆替頌以美盛德之形容而春秋之作尊王抑伯內中國而外夷狄無非古昔帝王治天下之要也今國都建成均黨術立庠序以六經之道教天下士然後命鄉論道藝大比興賢能俾之以六經之道上佐邦家下道民庶以輔成天下之治焉於乎休哉乃洪武二十六年江西承宣布政使張公文郁提刑按察使解公敏以明年大比遂集寮宷相與協謀合一道之士羣試于有司欽明詔也于是右布政使括蒼劉公宗霖司貢舉憲副維揚楊公建開封商公通監試事而宰也獲與司衡因得監觀諸俊彥之所述作其發揮諸經之義昭如日星援引諸史百家之言爛如雲漢於是拔其尤者置諸上選試事既集兩府議刋鄉闈小録俾余為之叙余惟君子之志于學也非知之艱行之惟艱今諸俊彥試之經而得經之㫖趣試之史而得史之事功方且膺薦書上春官余固知其策名㑹闈唱名于廷對有日矣然此皆平日討論之素而未嘗見之施行焉尚當以前日之所聞所知施行之事功而以古昔帝王之道之著之六藝者上佐聖天子文明之治送國子助教靳用中序士君子生盛明時不必計其身之用不用也惟在夫道之行耳身出以行其道使勳業顯于當時名聲昭于後世固士君子之大慶也然或退處田野而道淑諸人者行于世焉曾何計其身之用不用也吾國子助教靳君用中以目眚辭職人皆謂其遭世之理不得遂其志而去是行也得無鬱悒耶余曰不然用中與余同分教席于兹五年矣朝究六藝暮誦百家以修身治天下之道道其諸生且數十百人今諸生學成行修內為侍從外領藩翰牧守之寄風紀之司列于朝行市於邦甸不問地逺近東極青齊西踰秦隴北窮燕冀南至于荆吳嶺海七閩百粵其濟濟多士所以致君而澤民者皆成均出也是固朝廷樂育賢才之至化而用中得與教席宣明朝廷之化以及于人用中之道不既行矣乎使用中而典一邑道不過行于一邑使用中而牧一郡道不過行于一郡使用中而藩屏一方道不過行於一方而已其能如今日以是道淑諸人而達諸天下乎用中行修于身道孚于時又何必身處顯榮而後遂其志乎昔王通氏教授河汾其後髙弟子若房杜王魏諸人得其道以佐有唐貞觀之治用中縱不敢自比昔賢諸生之用于今日得無有佐盛世之治而超出貞觀者乎河汾之道行于後世而用中身親見之不已榮哉今用中之歸兒耕于疇婦蠶于室暇則命諸孫巾車拄杖登山臨水以樂今日太平之盛彼顯榮而行道于時者果能過用中乎用中行矣成均諸國老自司業博士二先生而下皆分題賦詩以贈俾宰為之序云送徐季益序東南曰揚州揚之東南曰四明海岸以為郡四明之東南曰昌國環海以為邑昌邑在東南海陬間昔人所謂三神山大瀛海者豈其地邪邑居海中地之域至此而盡山之脉至此而窮海之潮汐舂撞振撼朝焉以出暮焉以入莫不至此而進退焉夫地域盡山脉窮海潮會故其氣鍾于人物必多出秀者彼方士所謂瀛洲方丈蓬萊豈别有仙島所謂安期羡門豈真有神人居之殆亦想像夫山海之氣鍾于是而必有其人耳徐生季益入太學為上舍生氣溫而貌恭業勤而行修文學日益以進吾固知其鍾夫山海之秀焉或者謂安期羡門神仙中人而子方之季益瀛洲方丈蓬萊洞天别境非人間世所有而子擬之昌邑不已過乎噫昌國雖下邑季益雖一儒生使季益勉進于學昌邑涵煦盛明之化則士皆可造于聖賢之域而昌邑且為鄒魯邦矣豈直方外别境之與倫哉今朝廷方詔天下弟子員皆入太學士之鍾秀于是者毋自棄東海若季益之歸省也其與之偕來往送魏生序秦地本西周故疆在天官為東井之分野自𢎞農以西京兆扶風馮翊咸在而鳳翔正當岐山之陽風氣之龎習尚之淳好稼穡務本業猶有先王之遺風焉魏生應詔來肄業成均拜余館下貌古而性純儀觀充然氣宇溫然言辭粹然余固知其得於風化然也矧孜孜勉勉篤于務學哉又一年有㫖試諸生于學生果中選諸生讓其賢朝廷以生陜人識土宜知民俗授秦府伴讀日侍秦邸凡九閲月詔許歸省其親余又知生之父母兄弟及其鄉之長老嘉生以朴茂之質漸被朝廷禮樂教化之懿而蔚乎其有文焉則豳岐遺風之尚存者庶幾知所勵而復于古矣生歸蚤來以秦地民物之淳涵煦盛明之化立殿下啓曰方今四海一家至治邁西周上將見鳳凰之靈復鳴于岐山耶送賴思順鳳陽府學訓導序昔漢髙帝既平定天下還過沛復其民悉召故人父老發沛中兒教之歌大風之歌日暢飲道故舊為樂其英雄豪傑威加四海而歸故鄉歷千數百年未有能繼之者誠以泰運未易逢聖人不世出有待於今日也今皇上肇基鳳陽奄有九有乃偃武修文以鳳陽為中都建國學置弟子員選德重望隆之士為之師俾期門羽林之彥皆得以通義理郡復置文學掾俾郡之俊秀皆得肄業焉古今帝王之興其得天下不同惟我聖明之起於鳳陽與漢之豐沛無異也然髙帝以沛為湯沐邑今則建國學于中都髙帝召故人飲酒今則選德望之士以施教髙帝教沛兒歌舞以為樂今則俾期門羽林及郡之俊彥皆知學焉視漢沛殆過之矣漳南賴思順為國子上舍生儀曹以其年之盛學之茂也授鳳陽府學訓導重其選也或者謂今國子生出身出典方面入侍內廷任牧守拜御史皆若而人而思順獨領教職咸以為抑余以思順之從余游也告之曰今之鳳陽昔之豐沛也聖天子方且諄諄以文教化其郡之子弟郡子弟學成則升之學而顯榮若是况為之師者乎思順勉焉盡其教職顯榮之來其可量哉說全有堂說性也者人人之所全有也或者不能有而全焉氣之蔽也欲之泊也學焉而所知不蔽於氣所行不泊於欲則有者未嘗泯全者未嘗虧也是性也具於吾心其目有五曰仁曰義曰禮曰智曰信人人之所全有也上焉而聖固全有是性也下焉而愚亦全有是性也中焉而可以為愚可以為聖者亦全有是性也聖也者性焉安焉有而全焉愚也者暴焉棄焉喪其有而虧其全焉彼可以聖可以愚者暴焉棄焉則喪而虧者終不得而復復焉執焉則喪而虧者庶幾復全其天焉孟軻氏曰性善知性之全有是善也天命之性也荀卿氏曰性惡揚雄氏曰善惡混韓愈氏曰性有三品皆以其禀於氣者當之而不知性之全有是善也且吾性之具於心人無有不善也謂之惡可乎人無有不同也謂之混可乎人無有不全也謂之三品可乎彼謂為惡者即氣之汨沒者言之耳謂為混者即氣之清濁者言之耳謂為三品者即氣之至清至濁與夫清濁之間者言之耳又孰知性即五常之理乎知性即五常之理則皆善也何有於惡乎何有於混乎何有於三品乎叔魚之生虎目而豕啄楊食我之生豺狼其聲叔椒之生熊羆其狀是皆形聲之得於氣者然也果可謂之性乎彼徒即形聲以命其死亡固不足為訓而韓子復即是以明其性之不善若然則伏羲蛇身神農牛首仲尼䝉倛周公如斷椔而皆為人天性之善何與於形聲間邪彼三子之不能脫禍行之惡也非形相之惡也又豈可即是以明性之惡乎孟軻氏之言性善是已韓子不當即是以非之也后稷之生岐岐然嶷嶷然是故性之善也文王之生也傅不勤師不煩是固性之善也荀卿氏謂之惡韓子非之是已但以母之生后稷也無害生文王也不憂為后稷文王之性則非也堯文之善性也朱管習於堯文而卒為姦自暴也瞽鯀之惡害於氣也舜禹生於瞽鯀而卒為聖性之也上智之不移也揚雄氏謂性之善惡混韓子非之是已但以朱管之姦瞽鯀之惡為性則非也性也者人人之所全有也不以智而豐不以愚而塞不以上焉下焉中焉而殊也韓子之言三品蓋本諸夫子性近習逺上智下愚不移之說不知夫子所言氣質之性也非性之本也性之本善人所全有孟軻氏之言性善是也夫何三品之有哉書曰惟皇上帝降衷於下民若有恆性易曰一陰一陽之謂道繼之者善也成之者性也詩云天生蒸民有物有則民之秉彞好是懿德春秋左氏傳曰民受天地之中以生中庸曰天命之謂性是皆可以見性之本善而人人之所全有也孟子言性善蓋本諸此嗟夫人之有生形也者氣之聚也性也者理之會也孟子論性不論氣知性者也其言特未究耳諸子論氣不識理不知性者也故其言也不明逮程張朱子之言出而性之論確矣故後之人得以窮夫理而盡其性焉勾吳黃原輔氏者其進修之室曰全有蓋本諸子朱子叙大學之㫖也原輔性能格物以致其知誠意以正其心則性之固有者可以復全其天焉且原輔之所謂全有者全其性之所有也用也吾敢并以其得於天而本然全有者為原輔言之原輔將欲全其所有以立程朱之門以造孟氏之域以升孔子之堂固由其命于天者無不全也作全有堂說鄧唯吾字說茶陵鄧貫方且冠也鄉先生字之曰唯吾蓋取諸曾參氏之一唯也今年幾五十矣且猶不敢忘而請余為之說噫子不觀夫秋之奕雖機變不齊而得之於心則應之於手有數存焉然而秋已不驟而語人也必幾於秋而後語之人亦必幾於秋而後能悟也扁之斫也雖神妙不測而得之於心應之於手有數焉然而扁也不驟而語人也必幾於扁而後語之人人亦必幾於扁而後能悟也學秋而不升其堂學扁而不嗜其胾雖語之以斫奕安能唯諾而得之心哉斫奕小數耳且猶不驟而語人而况聖人之道乎聖人之道猶緡然九府之圜一緡繫之萬事之緒一理貫之然不入九府不涉萬事驟而語之將無所措其手足也聖人之門唯參也若遍歷夫九府之圜矣而聖人示之緡焉吾知其貫也得之心應之手無異秋與扁也一唯而悟何疑哉雖然未至於參强而語之勉而唯之妄也然則如之何盍以盡夫忠恕之道而後夫唯也唯吾勉之聽潮說普濟寺在越江東北介江海之交環寺皆海也潮汐上下振撼之聲春秋冬夏朝夕無少休焉名其堂曰聽潮今平石衡上人居之余問缺名勝詩文示余灑然若清泠之洗耳滄浪之濯塵纓也復請余說聽潮之義余謂潮有聲上人聽焉余惡足以知之䝉莊曰井蛙不可以語海曲士不可以語道聽潮之義殆將以海而喻夫道也余惡足以知之上人妙通海㑹之㫖余請質之缺潮聲無隱千萬人之耳皆聞焉上人獨聽焉上人耳有聞千萬物之聲皆入焉上人獨潮之聽焉將潮之至也與上人之聽適㑹于一時乎必潮至而後聽乎當千萬物之聲之接於耳也聽乎不聽乎合千萬物之聲而遍聽之將不勝其聽矣舍千萬物之聲而獨聽之無乃泥於一物乎吾聞浮圖人心寂而善應吾固知千萬人之皆聞潮而上人獨悟焉千萬物之聲皆入耳而上人獨於潮有覺焉上人之聽之殆不知潮之入於耳耳之入於潮焉故因聲以感物而妙於無聲因聽以悟道而超於無聽方且以聽潮名堂殆亦以上人之始也聞海潮音而覺悟焉耳乃今吾知其物之感之也非聲非無聲心之應之也非聽非無聽名之曰聽潮殆亦寓焉上人以余言而綴之聽潮之編余愧夫望洋于海若也觀魚說余太學休沐之暇觀魚於西池若有所感焉為之說曰士之處于天地間猶魚之遊於沼乎魚之遊於沼出沒於滄波之上適其趣而已矣士之處于天地間逍遙於仁義之域適其趣而已矣天地者沼也逍遙者魚之出沒也仁義者水也沼必水而後魚得以出沒沼而無水蓋將索我於枯魚之肆矣奚以之而適其趣為知此則知所以逍遙於天地間哉疏食水飲陋巷簞瓢孔顔樂焉仁義存焉耳食前方丈後車千乘孟軻弗為仁義亡焉耳彼沼也而魚安焉以有水也彼天地也而吾充焉以有仁義也順其所安宏其所存吾與魚俱適矣莊周曰魚相忘乎江湖人相忘乎道德吾有取焉
