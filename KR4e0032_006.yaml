body:
  text: 臨安集卷六明錢宰撰雜著金陵形勝論皇帝神武定天下徳被萬方威加四海作都於金陵臣竊以為土地之廣人民之衆草木鳥獸之咸若際天所覆極地所載日月所照雨露所及罔不咸服是皆威徳之所致不在夫地之形勝焉臣二三老儒校書翰林早朝既退皇帝御華盖殿詔臣宰等入侍殿廷天顔穆如睿㫖肅若賜之使坐命之使言前席而問之使論金陵之形勝焉臣宰退而思之威徳所以服天下形勝所以防天下是威徳固神功至化之見於已然者而今日形勝之間盖將為聖子神孫千萬世治安之大防也易曰王公設險以守其國其是之謂乎昔周武既克商營周居於洛邑固以形勝之在洛邑也故其有天下也八百年漢髙祖既滅秦定都於闗中亦以形勝之在闗中也故其有天下也四百年今聖明之定都於金陵如周洛邑如漢闗中而形勢之勝氣運之盛又非周漢之所及焉觀之鍾山龍蟠石城虎踞莫不在左盼右顧奠此皇畿以牡其基秦淮之水𤣥武之湖莫不委蛇盤旋自大江入以固其襟抱而江漢二水之朝宗金焦兩山之對峙雄偉宏麗又若是其地之形勝誠天地間之偉觀也是宜今日定都建極于是以開千萬世太平之業焉抑嘗聞古人論天下之形勝莫不曰金陵有王氣者然周之宅洛漢之都闗中已驗於數千百載之前金陵之勝乃至數千百載之後而始驗於今日此固天地間氣運有遲速之不同也臣竊以為金陵之地山之脉絡自岷嶓來水之源委自江漢而朝宗經數千百里而後鍾於兹地尤必積數千萬年而後發於今日則今日聖天子之撫寧萬邦開大一統雖在周漢後觀之形勝觀之地運積之之深厚發之之宏偉盖将兼周漢之氣運傳之千萬世而無斁又豈闗中洛邑所可同日語哉洪武二十七年六月初吉文林郎國子博士致仕臣錢宰進漢莊陵畫像贊古之君子遭世之隆盛而時君聖明若可出以行其道而措天下於至治矣然而不事王侯髙尚其志肥遯于山巔水涯者往往有之伊祈氏之盛而巢父洗耳有虞氏之隆而善卷遁跡湯誥亳務光廬水武誓牧夷齊首陽漢髙起豐園綺商山光武復漢莊陵桐瀨若莊陵者其巢父善巻務光夷齊園綺之倫歟雖然務光夏人也湯滅夏故抱石而沉莊陵非務光比也夷齊殷人也武滅殷故采薇而餓莊陵非夷齊比也若然則園綺之倫歟園綺秦人也入漢漢髙不下士故逃漢太子下士終亦起而從之游若陵則光武故人而乃終耕富春非園綺比也若然則巢父善巻之倫歟夫巢巻遭唐虞之盛際而遁莊陵遭漢中興而遁宜相似矣然唐虞之時左稷契右䕫龍巢卷雖洗耳退跡與擊壤老人輩相與歌帝世之盛可也光武之世雖冦鄧諸臣文武備足固未可與䕫龍稷契並稱也陵固宜出而道之以王道陳之以帝謨而迺被羊裘釣澤中何哉盖以西都之季士風頽靡若孔光張禹輩伈伈俔俔持禄固寵如蛟龍釋風雲而干豢畜之樂可勝歎哉於是超然逺舉首倡髙節雖天子不得而臣之卒使貪夫㢘懦夫有立志以成一代忠義之俗髙風勁操超邁千古其有功於世教也大矣夫豈巢父善卷遭堯舜之理而迺以隠為髙往而不返者之與倫哉攖寧篇䝉莊氏之學得之田子方卜子夏氏其所從來盖亦出於孔子或者謂其學聖人而差矣咸弗之取而不察其純焉或謂莊也槩以繆悠荒唐之辭汨其純而疵之若攖寧之説是已許昌滑君栢淳其自號曰攖寧生盖取諸䝉莊氏之純者也傳曰與其潔也滑先生取以為法焉攖者動而運之之謂也寧者静而安之之謂也日月星辰之運行風霆之鼓舞夜旦之代謝寒暑之推移確乎其運於上者若或攖之而天道未嘗不寧也江河山岳之流峙草木之榮瘁禽獸之飛走魚龍之潛躍隤乎其運於下者若或攖之而地道未嘗不寧也禮樂刑政之經親義叙别之倫喜怒哀樂之情榮辱得䘮之變古今之運禪代之權升降抑揚進退之節茫乎其運於兩間者若或攖之而人道未嘗不寧也三極之道孰攖之而運邪孰弗攖而寧邪運者自運寧者未嘗運也是故聖人有以見天下之賾其動也若攖其静也若寧與天地同其清彼衆人也聲色攖其耳目利欲攖其心志逸樂攖其四支百骸外而物攖焉内而氣攖焉拂其性而不吾寧焉莊也有見於此其知也朝徹而不役於心其行也外物而不役於物是故物攖亦攖物寧亦寧庶㡬乎超絶庶類而泊乎與聖人同其情此滑先生之有取於莊其亦庶乎心與道𡨕而相忘於攖寧拙解勾餘之村有處士焉曰王旭翰章懐素抱朴厭世俗之機巧名其齋居曰拙守智者誚之欲為巧而不能欲去拙而不可二者之惑接鬬於心不知所從請謁於籛孫伯子而求為之解嘲焉伯子因詰之曰子之拙守何如哉處士曰天錫余以拙余寧安余天莫余哲也彼龍阿之割金斯折曾不若款款悃悃為鉛刀之鈍也彼榱桷之才木斯災曾不若渾渾沌沌為溝中之斷也彼善戰之騎攻無堅或踣而顛曾不若駑馬之局促于轅也彼卜郊之犧啖以菽及踦而觸曾不若童牛之縮朒于牾也彼禱蓍之神莫逃于摓策曾不若原草之莽莽遂以適也彼元龜之靈莫脱乎焍黄曾不若埳蛙之蠢蠢樂其生也彼圓如丸寧方之安也彼詭如機寧正之持也彼險如穽寧易之正也彼詐如狙寧守余迂也彼狡如兎寧安余固也彼合從連横巧於謀也一敗而車爾裂曾不若訥者之嘿嘿終無尤也彼戰勝攻取巧於兵也一跌而族爾赤曾不若懦者之縮縮終無懲也彼孰得孰失孰誠孰偽孰岀於奸孰合於義世方挾詐而尚媚謂孽狐不妖謂騶虞不智佞夫馳騁良工懐愧彼徒僥倖行險而不知俟命於居易故吾寧守吾拙而不吾棄焉伯子喟然而歎曰夫直者不能為曲平者不能為窐圓者不能為缺齧方者不能為攲斜鶴頸雖長不可斷鳬頸雖短不可加此皆得於天之固然子能全爾天守爾拙彼有機心者又焉得而爾瑕且才之拙者性必魯子獨不聞參也魯而卒聞聖人之道邪雲山種藥誌會稽之南市去種山三里而近漢薊子訓賣藥所也吕君居簡世居之居簡業善醫居善藥既老以醫授其子樂善而築圃舍南從容游息以自適焉居則種藥于圃出則採藥于山近則溯若溪登宛委訪葛洪丹井採苓松下逺則攀天姥上沃洲過戴逵髙隠處采术南明山中或終日夕或浹旬朔翺翔夷猶興盡趣適翩然返佩歸吾雲西之圃日從事乎樹藝斸苓西疃種术東畦或樹蘭茝或蒔艾蕭紫芝可茹黄精可餌芎藭可以去濕苻蘺可以澤肌枲耳可以强志昌陽可以引年胡麻可以辟榖以及羊蹄秃蓫燕尾菰蔣豨薟似芥薺苨如參茹䕡芄蘭兠零接余藥品之夥不可殫紀稽之本草雖不盡越産而葱蒨緑縟敷紛於林臯山澤間者咸為採而致之圃亦皆可以頤神養氣攝生理性療疢疾而起沉疴焉及夫種藥之暇荷鍤而休憩息於前除髙梧落蔭白石如砥掃落花以藉草聽流泉而支頤好風泠然坐嘯終日攬衣而起不知夕陽已下西樹吾佳其興趣之髙有隠者之風不過寓情種藥以消遣世慮云耳若夫藝術之精造詣桑扁特其餘事也薊子訓不得擅髙風於會稽市上矣因為著雲山種藥誌書諸畫圖之後而歸之
