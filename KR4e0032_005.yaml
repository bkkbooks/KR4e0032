body:
  text: 臨安集卷五明錢宰撰記待旦軒記郢李侯克一之佐越也克勤於政中夜以思待旦而行不敢少怠因扁其軒居曰待旦求豫文記之軒上曰吾將以致警焉豫惟人之處於天地之間君子勞心小人勞力罔不夙夜以致其思以克勤乃事而旦者又一日之始其可不致謹於是乎是故良農朝出耕耨晝而災播暮而息耒一日之作勞必始於旦良工朝飭繩矩晝而斧斫暮而計工一日之傭役必始於旦商旅朝問郵傳晝而負趨暮而旅寓一日之行邁必始於旦士君子朝理鉛槧晝而窮經遊藝暮考其行為終日從事乎操修亦必於始旦而致謹焉卿大夫朝而獻替晝而展采錯事暮計其功業終日從事乎政治亦必於始旦而致謹焉以至上而為君為相朝而朝夕而夕無或少怠尤必昧爽丕顯以致謹於旦况於在下位者乎夫旦者作事之始也旦而不致其謹終日之間吾不能保其無怠焉君子慎終於始可不致謹於旦乎且謂之待旦則夜之所思蓋以從事於未旦之前矣雖然君子之學勤以待旦固急於行也茍中夜以思旦氣靡寧吾懼夫待旦而行者或有所未盡焉今克一以待旦名軒操存乎中夜戒慎乎平旦吾知其夜氣既清待旦而行必有大過人者矣鄒書曰仰而思之夜以繼日幸而得之坐以待旦聖人且然後之人其可不知所勉哉彀齊記丹崖子率諸生射於西圃樂其子之淳之彀而中也名其齋居曰彀庶幾其勉進於學也旦日早之淳謁伯均子豫而問彀伯子進之淳而告之曰射為六藝一其中於侯也有道存焉雖然子之嚴君以儒者之道教人其望於之淳也豈直為一藝之微乎昔羲黃以彀弋道堯舜以彀弋德湯武以彀弋功桓公以彀弋伯彀之道古昔聖賢嘗著之書矣易書詩禮春秋虎侯也參伋孟軻左丘明公榖之傳熊侯也周程張朱之書豹侯也外其餘諸子百家之書若麋侯布侯然其崇卑廣袤固未暇論莫不以仁義禮樂性命道德為之的也學之者修身以為弓矯思以為矢必至於彀而後發則發無不中矣不彀雖有弓矢不可得而中也試為之引弓挾矢獵程朱之緒言目睹乎正蒙手指乎西銘心馳乎通書太極以為之的吾知其朝發新安夕抵關陜夜入濂洛而發無不中此一彀之獲也子之射誠好之而不厭則駕飈車騁逸騎馳獵乎東魯而較藝乎矍相之圃目注乎易真為龍馬之負河手指乎書真若科斗之出壁足履乎髙堂后蒼之禮耳聆乎關雎四始之詩心馳乎獲麟之經以為之的而吾子之張弓舍矢如破則鄒嶧之道收而洙泗之域可得而入矣此再彀之獲也若夫老莊之虛無正而不正申韓之淺陋鵠而不鵠楊墨之偏陂的而不的雖橫弓却手飲金沒羽而中失之數子之道猶詭遇耳君子不彀也君子之彀志於聖人之道而已嗟夫聖人之道其猶張弓乎經也者聖人之正鵠也行也者聖人之弓矢也禮也者聖人之彀率也射者之張弓必至於彀率則發無不中於鵠君子之行已必志於禮義則行無不合於經之淳信能由射而進夫道焉如弓矢之審固也如彀率之合于凖度也知之明行之篤如左右手之如拒如附也引而後發如四鍭之樹也失諸正鵠反求諸其身則可以進于聖人之道矣之淳勉焉永思亭記先世故居在臨海者宋思陵所賜第也宰從孫用勤居之有草堂焉先太師漢國公所建堂之扁思陵宸翰也堂今圯矣扁之刻於石者泐矣用勤在時恆欲築室故趾弗果成今年夏用勤之子汝賢謁余會稽請曰汝賢今幸結亭趾上扁曰永思以承先人之志矣願翁記之亭示不忘焉余因進汝賢而告之曰古之人豐功懋德令聞令望勳澤之埀於世子孫無時或忘其永思之謂乎先世以忠孝稱天下勳澤之深長後之人思世守而弗替固不以窮達間也自忠懿藉土歸宋三百年間子孫饗有祿位王封相命或參朝政或秉樞要在外則擁麾節屏藩翰分符典郡布列庶位莫不上佐明哲以致治平而德澤加于時固足貽後人之思矣由宋入元子孫以前朝勳舊無復仕進意然而詩書滿家田園滿涯出則遊歌乎隴畝處則揖讓乎家庭父召而子趨夫令而婦俞兒湛書詩女弄機杼兄弟子姓友悌相與出相娛嬉入相誨語晝詠春風夜誦秋雨庶幾交養乃心而孝悌行於家亦未嘗不貽後人思也乃今大明開國詔進唐賜金劵時用勤之父尚德以劵朝寵錫有加尋敕尚德奉券以歸子孫榮之如重受賜今汝賢以永思名亭余既敘歷世勳澤所當致思者為汝賢告矣而今日朝廷詔以劵進聲光動京闕詔以劵歸恩寵耀里閭皆先世遺澤所致又其可或忘之邪鄒書謂君子之澤五世而止今吾錢氏至汝賢且十有七世矣而忠孝之澤世濟其美為子孫者又其可或忘之邪尚德字允一用勤其子也用勤字克邦汝賢其子也汝賢字士俊與宰同出太師丞相忠靖公云煮雪軒記西江汪季子築室于别墅落成之日玄雲蔽江朔風號寒大雪布遙野適匡廬山道士葛公子虛九江浮屠無人過季子相與談玄季子著銀鼠帽狐裘豹袪傲雪出迎客既入席命童子設宴具􅡒熾炭出醇酎為二客禦寒焉酒半季子索許旌陽燒丹竈軒轅彌明煮茶石鼎伐桂樹枝與二客躡屐中庭斫白雪納鼎鐺瀹茗而煮之火且熾白雪旋化若生銀入冶鎔而為玉液若真鉛九轉變而為玄霜一勺入口神水上華池靈永斯烈白雪之英清入肺腑因名其軒曰煮雪無人作煮雪偈子虛作步虛聲歌陽春白雪之謡其髙潔之操為何如耶雪且霽二客别去季子過余請紀其事以為雪中嘉話嗟夫雪天地間至清之氣也區區金帳飲羊羔肆其粗鄙固不足以語雪彼陶榖挾黨家姬煮茶以雪亦不過以清自文其淫哇泄俚去黨幾何適足為白雪汚也亦何羡歟古之人若袁汝南大雪不宜干人閉門髙卧風節抗千古若王參軍棹雪訪故友至門便返髙風逮今吾季子煮雪乃與葛子虛浮屠無人俱直將遡王袁二子而同其髙潔於千載之上夫何愧於雪哉季子字文壁南昌人天光雲影軒記上虞貝君彥中顓靜之士也宅近市湫隘之氣不足於目之官也喧囂之聲不足於耳之官也世俗之交不足於心之官也於是謝絶人事掩關不出營於前除得十柯之地鑿池焉築軒其上以為燕處之室淵泉冽清白金鑿鑿上挹天明下瞰深碧篆於額曰天光雲影蓋取諸考亭朱夫子詩話庶幾曠吾耳目之官以養其心焉余嘉彥中之燕休専務修省不為遊觀之好可尚也已因每造彥中相與臨深鑒清若有契於心者因為之喟然嘆曰嗟夫人之所以與天地參者其惟吾心乎心也者神明之舍也其靜也虛其動也靈其寂也不昧其感也不測方其燕處乎一室也一物不接一慮不萌虛室生白明明乎天地之府炳炳乎萬物之鏡也昭昭乎古今之鑒也悠悠乎表裏一致而洞達無間也冥冥乎物我兩忘而俯仰無愧也肅乎其神之著也浩乎其氣之充也皎皎乎日星之照臨也湛湛乎淵泉之靜深也蕩蕩乎天光之上下雲漢之昭回皆發乎方寸之間囿乎函丈之中而擴乎其無外也此子朱子天光雲影之語境與趣合神全氣充雖吾心之明薄乎雲天之表而其所處乃不出乎方塘水鏡之間視蒙莊氏宇泰定發天光而為是渺茫荒忽之説者不同其所養可知矣今吾彥中日燕坐軒上仰瞻太虛俯鑒秋水天光落淵白雲如沐而至理之妙悠然會於吾心其於先哲之旨趣庶幾其有所得哉湘陰草堂記勾越之墟有山焉曰蕭山有水焉曰湘湖山秀而疏水澄而深邑之人謂境之勝若瀟湘然因以名之有湯處士者世居其地間嘗築室於湘水之陰日與賓客燕處其上以遨以嬉且將以為歸藏之地焉名之曰湘陰草堂其子揖謁余記之余嘉其達死生之道也因為之言曰夫天地之氣合散消息變化無常忽焉寓之而為人其生焉配合而育廬處而休飢食而渴飲夏葛而冬裘仰事俯育而五倫是由出則為公為卿為大夫仕以行其道以濟其民以致其君堯舜使休光顯于當時聲聞埀於後世此生人受命于天順處夫世之為也吾非慕此而貪生氣之至也吾不得而辭焉及其死也氣散而歸魄委而休形化而心息智釋而神遊超然遺物而獨與道侔此生人委命於天遺世絶俗與化俱逝之所當然也我其安之張子曰存吾順事殁吾寧也其此之謂歟彼將脫死以偷生固逆於天此樂寂滅而自謂超脫於天地外者又躡空而無所據依固皆私見鑿知之所為也夫豈吾生順死安之道邪今處士退處於家不樂仕進既老築草堂於湘陰豐其燕遊以樂其生卜其宅兆以安其死其達死生之理識變化之妙夫豈怖死而求長生捐生而樂寂滅者所可同日語哉因書而為湘陰草堂記俾修身以俟之葵南草堂記葵南生好樹葵日燕坐一室庭宇外不植他卉惟葵是樹題其齋居曰葵南草堂吾嘉其方勉於學已有志於當世焉因為之言曰嗟夫君子之昔寓情于物固皆取其德之似也昔之人或樹蘭焉或樹菊焉或樹梅焉生獨不法諸古人而葵是樹邪吾知生之志矣蘭生於幽谷屈大夫之貞潔似之菊秋而花陶徵君之靖節似之梅發於窮冬搖落之後林處士之幽隱似之今生也際文明之運有志於學且將出以行其道于時上尊人君下榮父母夫豈髙蹈逺遁者比邪嘻樹蘭者吾知其有抗世之志樹菊者吾知其有邁世之節樹梅者吾知其有髙世之行至於葵其節直其心赤花如金卣黃中其色而青青茂葉又得以蔽其本根吾知其承雨露於天向日之輝光傾其心而無斁焉而生也樹之庶幾其有志於當世焉若果其有志於當世必其忠義之藴於中者無時或忘其猶葵乎茍徒慕葵之名而弗思葵之志節則其於葵乎何有生也讀書之暇日對南葵盍以勉焉以存其尊君親上之心以養其委身為國之操進思盡其職退思盡其心以為父母榮也則不惟傾陽向日之慕且將為本根之蔽焉生其有葵之心哉生字文敬姓汪氏山陰人澄心堂記臨安張仲子賣藥於錢塘北市仲子天性沉靜往往以所居在㕓市上塵坌之氣得以滑其心焉作而曰人亦有言將為心監莫先於水監於是乎東走江將以監夫水焉則淖水漭漭風濤爾蕩之魚鹽之氣日翳於目心不得而靜也既又西抵湖將以監夫水焉則穢流活活汚潦爾滑之淫哇之聲日接乎耳心不得而靜也仲子仰而歎曰二水也源之不澄其何以澄夫人心哉於是返吾北市掩關不出謀之屋外得十柯之地鑿池焉築室其上淵泉瀏清白石鑿鑿上挹天明下瞰深碧扁於顔曰澄心庶幾擴吾耳目之官以養吾心焉一日仲子絶江而東謁余舍下請余作澄心堂記俾知所勉焉余因握手告仲子曰嗟夫心也者神明之舍也其靜也虛其動也靈其寂也不寐其感也不測方其命之於天也其清明専一之體固無不全惟所秉之氣不齊苟不知所以養之則利欲得以滑之聲色得以惑之清明者或濁之而専一者或駁之矣信能加澄治之功俾復全其天則方寸之間明明乎天地之府也炳炳乎事物之境也昭昭乎古今之鑒也皎皎乎理義之淵藪也淵淵乎表裏一致而洞達無間也冥冥乎物我兩忘而俯仰無愧也仲子言能以一勺之水而澄夫心焉必也一物不接一慮不萌使涵泳之久浹洽之深則心與理融水與氣并湛湛乎淵泉之靜深炯炯乎性宇之澄徹吾不知心之入於水焉水之入於心焉心與水殆無不澄矣仲子其歸而燕坐澄心堂上仰瞻太虛俯鑒秋水天光落淵寸心如濯而理妙洽乎淵泉則澄心之道得矣仲子其歸而監諸水焉有餘師仲子名某字宗禮長嘯軒記夫人心之感於中而發於外必著見於顔色充滿於神氣簸揚於聲音間不可得而遏也然而顔色之著神氣之充或不足以盡攄其所蘊蓄惟聲之發於口也抑揚宣暢慨歎而不能自己故其心之所感莫不消融蕩滌神安氣平顔色之和咸復其常焉昔者舜歌南風漢髙歌大風武帝歌秋風與夫屈之騷宋之賦賈生司馬相如揚子雲輩之所述作莫非有動於中而後發然此皆著之言辭者也若夫諸葛孔明孫登阮籍則不假言辭但長嘯以發其胸中耿耿者其快然自得何如也余觀籍以倜儻不羇之才宏放傲世當魏晉間傷時之不可為乃恆寓之嘯以舒其鬱抑之氣彼登者隱居不仕遺落世事尚猶不能平其心邪然武侯躬耕南陽時亦復抱膝長嘯乃知彼雖傲睨物表而此心未嘗忘天下於是以其心之不平發而為嘯也建昌劉子憲名其燕處之室曰長嘯軒蓋得夫三子之志者方子憲未遇時歷患難經險阻困窮鬱抑隱憂忿怒或少適意而歡欣愈懌俯仰今古感慨盛衰莫不登髙騁望蹙口出聲以發舒其憤悶其髙隱似登其宏放似籍而其志節惟孔明是慕焉為之長嘯宜也今既遭逢盛時出入胄館而髙風逸思尚猶不忘吾知其習聞夔章而向之長嘯將變而為黃鐘大吕之和不翅若曾參氏曳履而歌聲滿天地然且不止於是又將移其音聲播之九歌以鳴帝世之盛矣子憲聞余言俯而不答起而長嘯響若鸞鳳音若有契於懷者因為記之軒上丹穴山房記越勾餘之南有崇阿焉曰丹穴左雙雁右蛾眉徑狹以迂林翳以密入其中地曠以衍可耕可鋤可樵可漁士君子之未遇者於是索居焉夏君悅言其人也悅言與余交扁其居曰丹穴山房謁余為之記余復之曰君子之出處亦安乎時而已古之人析圭儋爵懷銀黃紆朱紫珥貂而冠鳴珂而佩軒車髙蓋馬如遊龍騶導而行過者辟易不敢仰視豈惟誇貴富示榮顯而已入則輔政於內出則宣化於外羽儀朝著蕃翰邦家以任天下之道焉道之不行則隰耕而野桑山樵而水漁以衣以食以奉其親以活其妻子亦豈安淡泊樂隱而已是必明天人之理窮事物之宜達古今之情知盛衰之變輕世肆志抗節不屈以韜其光而人莫之知也往時勾餘之地藩臣竊據四郊多壘吾悅言處此隱居求志固其所也乃今天下文明士皆彚征而起悅言固宜上法古人與時出處豈終隱於是邦且吾聞丹穴産鳳凰文明之祥也舜時來儀文王鳴於岐山吾知丹穴之鳳今且為聖明出矣為士者又安得不附鳳翼以翺翔於青雲哉經正堂記夫三綱五倫萬世不易之常道未嘗不具於人心無何世衰道微大經不正而邪慝之流或得憑藉以濟其私故君子每惓惓乎思復其常焉初南昌熊伯紀氏方讀書有志於聖賢之學時虞文靖公集自翰林歸僑居南昌伯紀因得登其門受業焉公為名其燕處之堂曰經正亦由元綱向微懼學者之或流於邪慝故勉之使歸於正深得孟軻氏反經之遺意焉伯紀感風之深餘五十年方且求余為之記伯紀若曰當衰微時得不廢正學文靖之教也故俾余措諸辭以闡明其義焉耳嗟夫昔者孔子沒洙泗之學散於四方子張居陳子貢居宋淡臺子羽居楚其傳不可得聞矣子夏之後有田子方子方流而莊周商瞿之後有駢肩子𢎞流而荀卿獨曾參氏傳之子思子思傳之孟軻為斯道之正傳及孟子殁而失其傳焉然反經之義未嘗忘也宋周程朱子上接孟軻氏不傳之緒其後濂洛之學散於四方謝良佐氏居上蔡尹焞氏居河南遊酢氏居建陽蓋亦各有所傳矣惟楊中立氏傳之羅仲素仲素傳之李延平延平傳之新安朱子為斯道之正傳當時髙第弟子傳之者衆矣惟勉齊黃先生幹得朱子之正傳其後勉齋之學北山何先生基得之而江左之傳代有其人雙峯饒先生得之而江西之傳代有其人當宋末元初時雙峯諸孫曾若此山若則庵二先生皆獲承家學而南昌諸前輩莫不惟雙峯是宗吾伯紀固知宗饒氏以上遡新安之傳矣而又得文靖公經正之教而不惑於衰微時又得際文明之盛以闡明正學何其幸與况南昌自濂溪先生之知縣事郡人知宗其道為天下先而朱子所撰祠堂記言之備矣伯紀庶幾近宗雙峯上接新安而進造濂溪之道以修諸身以淑諸人毋若昔之人學聖而流於莊荀學賢而淫於老佛而一以綱常之大經是法溯清流乘長風以窮夫洙洛之源也庶無忘乎經正之訓庶無忘乎新安之正傳哉
